<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History | SteinBauer LLC</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.png">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f6fa;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: #1e293b;
      color: white;
      padding: 12px 0;
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .tab {
      cursor: pointer;
      padding: 10px 15px;
      border-radius: 6px;
      transition: 0.3s;
      font-size: 14px;
    }

    .tab:hover,
    .tab.active {
      background: #ffffff;
      color: black;
    }

    .container {
      padding: 15px;
    }

    /* Summary cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    .card {
      background: white;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .card h4 {
      margin: 0;
      font-size: 12px;
      color: gray;
    }

    .card p {
      margin: 5px 0 0;
      font-size: 18px;
      font-weight: bold;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .filters input,
    .filters select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      flex: 1;
      min-width: 160px;
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: left;
      font-size: 13px;
      white-space: nowrap;
    }

    th {
      background: #f1f5f9;
    }

    .status {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      display: inline-block;
    }

    .success {
      background: #dcfce7;
      color: #166534;
    }

    .failed {
      background: #fee2e2;
      color: #991b1b;
    }

    .pending {
      background: #fef9c3;
      color: #92400e;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .cards {
        grid-template-columns: repeat(2, 1fr);
      }

      table thead {
        display: none;
      }

      table,
      tbody,
      tr,
      td {
        display: block;
      }

      tr {
        background: white;
        margin-bottom: 12px;
        border-radius: 10px;
        padding: 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      }

      td {
        text-align: right;
        padding: 8px;
        position: relative;
        border: none;
        border-bottom: 1px solid #f1f1f1;
      }

      td::before {
        content: attr(data-label);
        position: absolute;
        left: 10px;
        font-weight: bold;
        text-align: left;
      }

      .pagination-container button {
        padding: 5px 10px !important;
        font-size: 12px !important;
      }
    }

    .machine-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: bold;
    }

    .status-light {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
      background: red;
      box-shadow: 0 0 8px rgba(255, 0, 0, 0.8);
    }

    /* GREEN */
    .status-light.green {
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
    }

    /* RED */
    .status-light.red {
      background: #ef4444;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.9);
    }

    .pagination-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    .pagination-container button {
      border: none;
      background: #f1f1f1;
      color: #333;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .pagination-container button:hover {
      background: #dfe6ff;
    }

    .pagination-container button.active {
      background: #4f46e5;
      color: white;
      font-weight: bold;
    }

    .pagination-container button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #paginationNumbers {
      display: flex;
      gap: 8px;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #ddd;
      border-top: 5px solid #333;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="tab" id="dashboard" onclick="showTab('dashboard', this)">
      Dashboard
    </div>
    <div class="tab" id="employee" onclick="showTab('employee', this)">
      Employee
    </div>
    <div class="tab active" id="history" onclick="showTab('history', this)">
      History
    </div>
    <div class="machine-status">
      <span class="status-light red" id="machineLight"></span>
      <span id="machineText">VM Offline</span>
    </div>
  </div>

  <div class="container">
    <!-- Summary Cards -->
    <div class="cards">
      <div class="card">
        <h4>Total Transactions</h4>
        <p id="total">0</p>
      </div>
      <div class="card">
        <h4>Success</h4>
        <p id="success">0</p>
      </div>
      <div class="card">
        <h4>Failed</h4>
        <p id="failed">0</p>
      </div>
      <div class="card">
        <h4>Pending</h4>
        <p id="pending">0</p>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <input type="date" id="searchDate" />
      <input type="text" id="search" placeholder="Search CardID" />
    </div>

    <!-- Table -->
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Card ID</th>
          <th>Date</th>
          <th>Item</th>
          <th>Qty</th>
          <th>Machine</th>
          <!-- <th>Cost</th> -->
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <div id="loading" class="loading-overlay" style="display:none;">
          <div class="spinner"></div>
        </div>
      </tbody>
    </table>
    <!-- Pagination -->
    <div id="pagination" class="pagination-container">
      <button id="firstBtn">⏮</button>
      <button id="prevBtn">←</button>
      <div id="paginationNumbers"></div>
      <button id="nextBtn">→</button>
      <button id="lastBtn">⏭</button>
    </div>
  </div>

  <script>
    function showTab(tabId, element) {
      if (tabId == "employee") window.location.href = "/employee";
      else if (tabId == "dashboard") window.location.href = "/dashboard";
    }
    function fetchEmployees() {
      const cardID = document.getElementById("search").value;
      const date = document.getElementById("searchDate").value;
      console.log("fetch called: 1");
      if (cardID == "" && date == "") console.log("fetch called: 2");
      else {
        console.log("fetch called: 3");
        showLoading();
        $.ajax({
          type: "POST",
          url: "/searchhistory",
          contentType: "application/json",
          data: JSON.stringify({
            cardID: cardID,
            date: date,
          }),
        }).done(function (data) {
          if (data.success) {
            console.log("Received Data:", data.users);
            document.getElementById("pagination").style.display = "none";
            render(data.users);
            document.getElementById("total").innerText = data.users.length;
            document.getElementById("success").innerText = data.users.length;
          } else {
            showAlert(data.message, "error");
          }
          hideLoading();
        });
      }
    }

    let typingTimer;
    const typingDelay = 1000; // milliseconds

    document.getElementById("search").addEventListener("keyup", function () {
      clearTimeout(typingTimer);

      typingTimer = setTimeout(function () {
        fetchEmployees();
      }, typingDelay);
    });

    // optional: stop timer while typing
    document
      .getElementById("search")
      .addEventListener("keydown", function () {
        clearTimeout(typingTimer);
      });

    // date change
    document
      .getElementById("searchDate")
      .addEventListener("change", function () {
        console.log("searchDate selected");
        fetchEmployees();
      });

    let currentPage = 1;
    let totalPages = 1;

    async function fetchHistory(page = 1) {
      showLoading();
      try {
        const response = await fetch("/gethistory", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            page: page,
          }),
        });

        const result = await response.json();

        if (result.success) {
          currentPage = result.page;
          totalPages = result.total_pages;

          render(result.users);
          document.getElementById("total").innerText = result.total_transactions;
          document.getElementById("success").innerText = result.total_transactions;
          renderPagination();
        }
      } catch (err) {
        console.log(err);
      } finally {
        hideLoading();
      }
    }

    function render(data) {
      const body = document.getElementById("tbody");
      body.innerHTML = "";

      let s = 0,
        f = 0,
        p = 0;

      const statusClass = ["failed", "success", "pending"];
      const statusText = ["Failed", "Success", "Pending"];

      data.forEach((log) => {
        if (log[5] == 1) s++;
        if (log[5] == 0) f++;
        if (log[5] == 2) p++;

        body.innerHTML += `
      <tr>
          <td data-label="Name">${log[0]}</td>
          <td data-label="Card ID">${log[2]}</td>
          <td data-label="Date">${log[6]}</td>
          <td data-label="Item">${log[3]}</td>
          <td data-label="Qty">${log[4]}</td>
          <td data-label="Machine">M3546</td>
          <td data-label="Status">
            <span class="status ${statusClass[log[5]]}">
              ${statusText[log[5]]}
            </span>
          </td>
      </tr>
    `;
      });

      document.getElementById("failed").innerText = f;
      document.getElementById("pending").innerText = p;
    }

    function renderPagination() {
      const paginationNumbers = document.getElementById(
        "paginationNumbers"
      );

      paginationNumbers.innerHTML = "";

      // Prev button
      document.getElementById("prevBtn").disabled =
        currentPage === 1;

      // Next button
      document.getElementById("nextBtn").disabled =
        currentPage === totalPages;

      let startPage = Math.max(currentPage - 1, 1);
      let endPage = Math.min(startPage + 2, totalPages);

      // Fix when reaching end
      if (endPage - startPage < 2) {
        startPage = Math.max(endPage - 2, 1);
      }

      for (let i = startPage; i <= endPage; i++) {
        const btn = document.createElement("button");

        btn.innerText = i;

        if (i === currentPage) {
          btn.classList.add("active");
        }

        btn.addEventListener("click", () => {
          fetchHistory(i);
        });

        paginationNumbers.appendChild(btn);
      }
    }

    document
      .getElementById("firstBtn")
      .addEventListener("click", () => {
        fetchHistory(1);
      });

    document
      .getElementById("lastBtn")
      .addEventListener("click", () => {
        fetchHistory(totalPages);
      });
    document
      .getElementById("prevBtn")
      .addEventListener("click", () => {
        if (currentPage > 1) {
          fetchHistory(currentPage - 1);
        }
      });

    document
      .getElementById("nextBtn")
      .addEventListener("click", () => {
        if (currentPage < totalPages) {
          fetchHistory(currentPage + 1);
        }
      });
    // Initial load
    fetchHistory(1);
    const socket = io();

    // Listen for connection
    socket.on("connect", () => {
      console.log("Connected to server");
    });

    // Listen for custom server events
    socket.on("response", (data) => {
      const light = document.getElementById("machineLight");
      const text = document.getElementById("machineText");

      if (data.data == 1) {
        light.classList.remove("red");
        light.classList.add("green");
        text.innerText = "VM Online";
      } else {
        light.classList.remove("green");
        light.classList.add("red");     
        if(data.data==2){       
          text.innerText = "Restart Machine";
        }
        else
          text.innerText = "VM Offline";   
      }
    });
    function showLoading() {
      document.getElementById("loading").style.display = "flex";
    }

    function hideLoading() {
      document.getElementById("loading").style.display = "none";
    }
  </script>
</body>

</html>
