<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Employee</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f6fa;
    }

    /* Header */
    .header {
        display: flex;
        justify-content: space-around;
        align-items: center;
        background: #1e293b;
        color: white;
        padding: 12px 0;
        position: sticky;
        top: 0;
    }

    .tab {
        cursor: pointer;
        padding: 10px 15px;
        border-radius: 6px;
        transition: 0.3s;
        font-size: 14px;
    }

    .tab:hover, .tab.active {
        background: #ffffff;
        color: black;
    }
    .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        margin: 20px auto;
    }

  .search-input {
    display: flex;
    padding: 10px 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
    gap:10px
  }

  .btn {
    padding: 10px 14px;
    font-size: 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
  }

  .search-btn {
    background: #007bff;
    color: white;
  }
  .searchfield{
    display: flex; padding: 10px 0;
  }
  .add-btn {
    background: #007bff;
    color: white;
  }

  /* Mobile responsive */
  @media (max-width: 480px) {
    .toolbar {
      flex-direction: column;
      align-items: stretch;
    }
    .searchfield{
        flex-direction: column;
    }

    .btn {
      width: 100%;
    }
  }
    .container {
        padding: 20px;
    }

    /* Date picker */
    .date-picker {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 10px;
    }

    .date-picker input {
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    .date-picker button {
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        background: #2563eb;
        color: white;
        cursor: pointer;
    }

    /* selected chips */
    .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 20px;
    }

    .chip {
        background: #e2e8f0;
        padding: 6px 10px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
        user-select: none;
    }

    .chip:hover {
        background: #cbd5e1;
    }

    /* Cards */
    .cards {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        margin-bottom: 20px;
    }

    .card {
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card h3 {
        margin: 0;
        font-size: 14px;
        color: gray;
    }

    .card p {
        font-size: 20px;
        margin: 5px 0 0;
        font-weight: bold;
    }

    /* Table */
    .table-wrapper {
        overflow-x: auto;
        background: white;
        border-radius: 10px;
        padding: 10px 5px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        min-width: 700px;
    }

    th, td {
        text-align: left;
        white-space: nowrap;
        border: 1px solid #ddd;
        padding: 8px;
    }

    tr:nth-child(even){background-color: #f2f2f2;}

    tr:hover {background-color: #ddd;}

    th {
    padding-top: 12px;
    padding-bottom: 12px;
    text-align: left;
    background-color: #04AA6D;
    color: white;
    }

    .status {
        padding: 5px 10px;
        border-radius: 6px;
        font-size: 12px;
        display: inline-block;
    }

    .active { background: #dcfce7; color: #166534; }
    .pending { background: #fef9c3; color: #92400e; }
    .denied { background: #fee2e2; color: #991b1b; }

    button {
        padding: 5px 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-right: 5px;
        font-size: 12px;
    }

    .view { background: #3b82f6; color: white; }
    .delete { background: #ff2200; color: white; }

    select {
        padding: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 12px;
    }

    @media (max-width: 768px) {
        .cards {
            grid-template-columns: 1fr 1fr;
        }
    }

    @media (max-width: 500px) {
        .cards {
            grid-template-columns: 1fr;
        }
    }
/* Background overlay */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

/* Modal box */
.modal-content {
    background: white;
    width: 90%;
    max-width: 400px;
    margin: 5% auto;
    border-radius: 10px;
    overflow: hidden;
    animation: fadeIn 0.2s ease-in-out;
}

/* Header */
.modal-header {
    background: #1e293b;
    color: white;
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Body */
.modal-body {
    padding: 15px;
    display: flex;
    flex-direction: column;
}

.modal-body label {
    font-size: 13px;
    margin-top: 8px;
}

.modal-body input,
.modal-body select {
    padding: 8px;
    margin-top: 4px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

/* Footer */
.modal-footer {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    background: #f3f4f6;
}

.modal-footer button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.modal-footer button:hover {
    opacity: 0.9;
}

.cancel {
    background: #ef4444;
    color: white;
}

/* Close button */
.close {
    cursor: pointer;
    font-size: 22px;
}
.alert{
    position:fixed;
    top:20px;
    right:20px;
    padding:14px 20px;
    border-radius:8px;
    color:#fff;
    font-size:14px;
    display:none;
    z-index:999;
    animation:fadeIn 0.3s ease;
}
/* Animation */
@keyframes fadeIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* Mobile responsiveness */
@media (max-width: 500px) {
    .modal-content {
        margin: 20% auto;
    }
}
</style>
</head>

<body>
<div class="header">
    <div class="tab" id="dashboard" onclick="showTab('dashboard', this)">Dashboard</div>
    <div class="tab active" id="employee" onclick="showTab('employee', this)">Employee</div>
    <div class="tab" id="history" onclick="showTab('history', this)">History</div>
</div>

<div class="alert" id="alertBox"></div>
<div class="container">
    <div class="toolbar">
        <div class="searchfield">
            <input type="text" name="search" class="search-input" placeholder="Type Employee Name or Card ID ..."/>
            <button class="btn search-btn">Search</button>
        </div>
        <button onclick="openModal()" class="btn add-btn">+Add Employee</button>
    </div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>ID</th>
                    <th>Card ID</th>
                    <th>Limit</th>
                    <th>Items</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="empTable"></tbody>
        </table>
    </div>
    <!-- Modal Overlay -->
<div id="employeeModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Employee Details</h3>
            <span class="close" onclick="closeModal()">&times;</span>
        </div>

        <div class="modal-body">
            <p id="dataalert" style="display: none; color: red;"></p>
            <label>Name</label>
            <input type="text" id="name">

            <label>ID</label>
            <input type="text" id="empId">

            <label>Card ID</label>
            <input type="text" id="cardId">

            <label>Item Limit</label>
            <input type="number" max="5" id="itemLimit">

            <!-- <label>Left Item</label>
            <input type="number" id="leftItem"> -->

            <label>Status</label>
            <select id="status">
                <option value="1">Active</option>
                <option value="2">Pending</option>
                <option value="0">Denied</option>
            </select>
        </div>

        <div class="modal-footer">
            <button onclick="closeModal()" class="cancel">Cancel</button>
            <button onclick="saveEmployee()" class="btn add-btn">Save</button>
        </div>
    </div>
</div>
</div>

<script>
function showTab(tabId, element) {
    if(tabId=='dashboard')
        window.location.href='/dashboard'
    else if(tabId=='history')
        window.location.href='/history'
}
function openModal() {
    document.getElementById("employeeModal").style.display = "block";
}

function closeModal() {
    document.getElementById("employeeModal").style.display = "none";
}
function showAlert(message, type) {
    const alertBox = document.getElementById("alertBox");

    alertBox.innerText = message;
    alertBox.className = `alert ${type}`;
    alertBox.style.display = "block";

    // Hide after 2 seconds
    setTimeout(() => {
    alertBox.style.display = "none";
    }, 2000);
}
function saveEmployee() {
    const data = {
        name: document.getElementById("name").value,
        ID: document.getElementById("empId").value,
        cardID: document.getElementById("cardId").value,
        itemLimit: document.getElementById("itemLimit").value,
        leftItem: 5,
        status: document.getElementById("status").value
    };
    if(data.name=='' ||data.ID=='' ||data.cardID==''){
        document.getElementById("dataalert").style.display = "block";
        document.getElementById("dataalert").innerText = "Please Fill Fields!";
    }
    else{
        if(data.itemLimit>6) {
            document.getElementById("dataalert").style.display = "block";
            document.getElementById("dataalert").innerText = "Item Limit must be less than 5";
        }
        else{
            document.getElementById("dataalert").style.display = "none";
            $.ajax({
                type: "POST",
                url: "/addemployee",
                data: JSON.stringify(data),
                contentType: "application/json"
            }).done(function(data) {
                if(data.success){
                    showAlert(data.message, "success");
                    console.log("Received Data:", data.user);
                    renderTable(data.user);

                }else{
                    showAlert(data.message, "error");
                }
            });
            console.log("Employee Data:", data);
            closeModal();
        }

    } 
}
// const employees = [
//     { id: "E101", name: "John Doe", limit: 5, items: 1, status: "Active" },
//     { id: "E102", name: "Jane Smith", limit: 5, items: 0, status: "Pending" },
//     { id: "E103", name: "Michael Lee", limit: 5, items: 3, status: "Active" },
//     { id: "E104", name: "Sarah Kim", limit: 5, items: 5, status: "Denied" }
// ];

const selectedDates = new Set();

function addDate() {
    const input = document.getElementById("dateInput");
    const val = input.value;
    if (!val) return;

    if (selectedDates.has(val)) {
        selectedDates.delete(val);
    } else {
        selectedDates.add(val);
    }

    renderDates();
    input.value = "";
}

function removeDate(date) {
    selectedDates.delete(date);
    renderDates();
}

function renderDates() {
    const list = Array.from(selectedDates).sort();

    document.getElementById("selectedDays").innerText = list.length ? list.join(", ") : "None";

    const chips = document.getElementById("chips");
    chips.innerHTML = "";

    list.forEach(d => {
        const el = document.createElement("div");
        el.className = "chip";
        el.innerText = d + " ✕";
        el.onclick = () => removeDate(d);
        chips.appendChild(el);
    });
}

function renderTable(employees) {
    let html = "";

    employees.forEach(emp => {
        html += `
        <tr>
            <td>${emp[0]}</td>
            <td>${emp[1]}</td>
            <td>${emp[2]}</td>
            <td>
                <select>
                    <option ${emp[3]==1?'selected':''}>1</option>
                    <option ${emp[3]==2?'selected':''}>2</option>
                    <option ${emp[3]==3?'selected':''}>3</option>
                    <option ${emp[3]==4?'selected':''}>4</option>
                    <option ${emp[3]==5?'selected':''}>5</option>
                </select>
            </td>
            <td>${emp[4]} left</td>
            <td>
                <select>
                    <option ${emp[5]==1?'selected':''} class="status active"}>Active</option>
                    <option ${emp[5]==2?'selected':''} class="status pending">Pending</option>
                    <option ${emp[5]==0?'selected':''} class="status denied"}>Denied</option>
                </select>
            </td>
            <td>
                <button class="view">Update</button>
                <button class="delete">Delete</button>
            </td>
        </tr>
        `;
    });

    document.getElementById("empTable").innerHTML = html;
    document.getElementById("totalEmp").innerText = employees.length;
    document.getElementById("activeEmp").innerText = employees.filter(e=>e.status=="Active").length;
    // document.getElementById("machineStatus").innerText = employees.filter(e=>e.status=="machinestatus").length;
}
// Convert the Flask variable to a JS object on load
$.ajax({
    type: "POST",
    url: "/getemployee",
    contentType: "application/json"
}).done(function(data) {
    console.log("Received Data:", data);
    renderTable(data);
});

</script>

</body>
</html>
