<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | SteinBauer LLC</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.png">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f6fa;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: #1e293b;
      color: white;
      padding: 12px 0;
      position: sticky;
      top: 0;
      z-index: 900;
    }

    .tab {
      cursor: pointer;
      padding: 10px 15px;
      border-radius: 6px;
      transition: 0.3s;
      font-size: 14px;
    }

    .tab:hover,
    .tab.active {
      background: #ffffff;
      color: black;
    }

    .container {
      padding: 20px;
    }

    /* Date picker */
    .date-picker {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .date-picker input {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .date-picker button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    /* selected chips */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .chip {
      background: #e2e8f0;
      padding: 6px 6px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      margin: 2px;
      display: inline-block;
    }

    .chip:hover {
      background: #cbd5e1;
    }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .card h3 {
      margin: 0;
      font-size: 14px;
      color: gray;
    }

    .card p {
      font-size: 20px;
      margin: 5px 0 0;
      font-weight: bold;
    }

    /* Table */
    .table-wrapper {
      overflow-x: auto;
      background: white;
      border-radius: 10px;
      padding: 10px 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    th,
    td {
      text-align: left;
      white-space: nowrap;
      border: 1px solid #ddd;
      padding: 8px;
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    tr:hover {
      background-color: #ddd;
    }

    th {
      padding-top: 12px;
      padding-bottom: 12px;
      text-align: left;
      background-color: #04aa6d;
      color: white;
    }

    .status {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      display: inline-block;
    }

    .active {
      background: #dcfce7;
      color: #166534;
    }

    .pending {
      background: #fef9c3;
      color: #92400e;
    }

    .denied {
      background: #fee2e2;
      color: #991b1b;
    }

    button {
      padding: 5px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 5px;
      font-size: 12px;
    }

    .view {
      background: #3b82f6;
      color: white;
    }

    .edit {
      background: #e5e7eb;
    }

    select {
      padding: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 12px;
    }

    @media (max-width: 768px) {
      .cards {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 500px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .dayoffschedule {
        flex-direction: column;
      }

      .week-tabs button {
        padding: 5px !important;
        font-size: 14px !important;
        min-width: 45px !important;
      }
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 34px;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: #4caf50;
    }

    input:checked+.slider:before {
      transform: translateX(26px);
    }

    .week-tabs {
      padding: 10px 5px;
    }

    .dayoffschedule {
      display: flex;
      justify-content: left;
    }

    .week-tabs button {
      padding: 10px;
      font-size: 16px;
      min-width: 53px;
      margin: 5px 0;
      background-color: lavender;
    }

    .week-tabs button:hover {
      color: white;
      background-color: gray;
    }

    .week-tabs .weekdays {
      color: #f1f1f1;
      background-color: rgb(53, 52, 52);
      /* background-color: #242323;  */
    }

    .machine-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: bold;
    }

    .status-light {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
      background: red;
      box-shadow: 0 0 8px rgba(255, 0, 0, 0.8);
    }

    /* GREEN */
    .status-light.green {
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
    }

    /* RED */
    .status-light.red {
      background: #ef4444;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.9);
    }

    .schedule-wrapper {
      display: flex;
      align-items: flex-start;
      margin: 5px 0px;
      flex-wrap: wrap;
      justify-content: space-between;
    }

    .time-slot-container {
      display: flex;
      gap: 15px;
      padding: 10px 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #f9f9f9;
    }

    .time-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .time-group label {
      font-size: 14px;
      font-weight: 600;
    }

    .time-group input {
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .alert{
      position:fixed;
      top:20px;
      right:20px;
      padding:14px 20px;
      border-radius:8px;
      color:#fff;
      font-size:14px;
      display:none;
      z-index:999;
      animation:fadeIn 0.3s ease;
    }

    .success{
      background:#28a745;
    }

    .error{
      background:#dc3545;
    }
  </style>
</head>

<body>
  <div class="alert" id="alertBox"></div>
  <div class="header">
    <div class="tab active" id="dashboard" onclick="showTab('dashboard', this)">
      Dashboard
    </div>
    <div class="tab" id="employee" onclick="showTab('employee', this)">
      Employee
    </div>
    <div class="tab" id="history" onclick="showTab('history', this)">
      History
    </div>
    <div class="machine-status">
      <span class="status-light red" id="machineLight"></span>
      <span id="machineText">VM Offline</span>
    </div>
  </div>

  <div class="container">
    <h3>Day-off Scheduling</h3>
    <div class="schedule-wrapper">
      <div class="dayoffschedule">
        <div class="date-picker">
          <input type="date" id="dateInput" />
          <button id="adddate" onclick="addDate()">Add Date</button>
        </div>
        <!-- WEEKDAY TABS -->
        <div class="week-tabs">
          <button data-day="1" onclick="setActive(this)">Mon</button>
          <button data-day="2" onclick="setActive(this)">Tue</button>
          <button data-day="3" onclick="setActive(this)">Wed</button>
          <button data-day="4" onclick="setActive(this)">Thu</button>
          <button data-day="5" onclick="setActive(this)">Fri</button>
          <button data-day="6" onclick="setActive(this)">Sat</button>
          <button data-day="7" onclick="setActive(this)">Sun</button>
        </div>
      </div>
      <!-- Time Slot Picker -->
      <div class="time-slot-container">
        <div class="time-group">
          <label>Start Time</label>
          <input type="time" id="startTime" />
        </div>

        <div class="time-group">
          <label>End Time</label>
          <input type="time" id="endTime" />
        </div>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Selected Dates</h3>
        <p id="selectedDays">None</p>
      </div>
      <div class="card">
        <h3>Total Employees</h3>
        <p id="totalEmp"></p>
      </div>
      <div class="card">
        <h3>Today Items</h3>
        <p id="activeEmp"></p>
      </div>
      <div class="card">
        <h3>
          Machine &nbsp
          <span id="machineStatus" style="color: black">OFF</span>
        </h3>
        <label class="switch" style="margin-top: 5px">
          <input type="checkbox" id="toggleSwitch" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="table-wrapper">
      <h3>Today Usage | <span id="today"></span></h3>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>ID</th>
            <th>Card ID</th>
            <th>Limit</th>
            <th>Items</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="empTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    const now = new Date();
    const formatted = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
    document.getElementById("today").innerText = formatted;
    function showTab(tabId, element) {
      console.log("tabid", tabId);
      console.log("element", element);
      if (tabId == "employee") window.location.href = "/employee";
      else if (tabId == "history") window.location.href = "/history";
    }

    const selectedDates = new Set();

    document
      .getElementById("dateInput")
      .addEventListener("change", function () {
        const input = document.getElementById("dateInput");
        const val = input.value;
        if (!val) return;

        if (selectedDates.has(val)) {
          document.getElementById("adddate").innerText = "Remove Date";
        } else {
          document.getElementById("adddate").innerText = "Add Date";
        }
      });
    function addDate() {
      const input = document.getElementById("dateInput");
      const val = input.value;
      console.log("selectedDates:", val);
      if (!val) return;
      addDayOff(val);
      input.value = "";
    }

    function removeDate(val) {
      $.ajax({
        type: "POST",
        url: "/deletedayoff",
        contentType: "application/json",
        data: JSON.stringify({ val }),
      }).done(function (data) {
        if (data.success) {
          console.log("Received DeletedDayOff:", data.days);
          renderDates(data.days);
        }
      });
    }
    function setActive(button) {
      let day = button.dataset.day;

      console.log(day);
      let status = 0;
      if (button.classList.contains("weekdays")) {
        status = 1;
      } else {
        status = 0;
      }
      $.ajax({
        type: "POST",
        url: "/updatedayoffweek",
        contentType: "application/json",
        data: JSON.stringify({ day, status }),
      }).done(function (data) {
        if (data.success) {
          if (button.classList.contains("weekdays")) {
            button.classList.remove("weekdays");
          } else {
            button.classList.add("weekdays");
          }
        }
      });
    }

    function addDayOff(val) {
      $.ajax({
        type: "POST",
        url: "/adddayoff",
        contentType: "application/json",
        data: JSON.stringify({ val }),
      }).done(function (data) {
        if (data.success) {
          console.log("Received DayOff:", data.days);
          renderDates(data.days);
        }
      });
    }

    function renderDays(days) {
      let kk = "";
      days.forEach((day) => {
        kk = document.querySelector(`[data-day="${day[0]}"]`);
        console.log("days-day:", day[1]);
        if (kk) {
          if (day[1] == 1) {
            kk.classList.remove("weekdays");
          } else {
            kk.classList.add("weekdays");
          }
        }
      });
    }

    function renderDates(dates) {
      const list = Array.from(dates).sort();

      // document.getElementById("selectedDays").innerText = list.length ? list.join(", ") : "None";

      const chips = document.getElementById("selectedDays");
      chips.innerHTML = "";
      list.forEach((d) => {
        const el = document.createElement("span");
        el.className = "chip";
        el.innerText = d + " ✕";
        el.onclick = () => removeDate(d);
        chips.appendChild(el);
      });
    }
    function renderTable(employees) {
      let html = "";
      const statusClass = ["Denied", "Active", "Pending"];
      employees.forEach((emp) => {
        html += `
        <tr>
            <td>${emp[1]}</td>
            <td>${emp[2]}</td>
            <td>${emp[3]}</td>
            <td>${emp[4]}</td>
            <td>${emp[5]} left</td>
            <td>
                <span class="status ${statusClass[emp[6]].toLocaleLowerCase()}">${statusClass[emp[6]]}</span>
            </td>
        </tr>
        `;
      });

      document.getElementById("empTable").innerHTML = html;
      document.getElementById("totalEmp").innerText = employees.length;
    }
    document
      .getElementById("toggleSwitch")
      .addEventListener("change", function () {
        const machinestaus = this.checked ? 1 : 0;
        $.ajax({
          type: "POST",
          url: "/changemachinestatus",
          contentType: "application/json",
          data: JSON.stringify({ status: machinestaus }),
        }).done(function (data) {
          if (data.success == true) {
            document.getElementById("machineStatus").innerText =
              machinestaus == 1 ? "ON" : "OFF";
            document.getElementById("machineStatus").style.color =
              machinestaus == 1 ? "#4CAF50" : "#000000";
          }
        });
      });
    function formatTime(t) {
      if (!t) return "";

      let [h, m] = t.split(":");

      h = h.padStart(2, "0");
      m = (m || "00").padStart(2, "0");

      return `${h}:${m}`;
    }
    $.ajax({
      type: "POST",
      url: "/getalldetails",
      contentType: "application/json",
    }).done(function (data) {
      console.log("Received Data:", data);
      console.log("Received Data3:", data[3]);
      document.getElementById("machineStatus").innerText =
        data[1][1] == 1 ? "ON" : "OFF";
      document.getElementById("machineStatus").style.color =
        data[1][1] == 1 ? "#4CAF50" : "#000000";
      document.getElementById("toggleSwitch").checked = data[1][1]
        ? true
        : false;
      renderTable(data[0]);
      renderDates(data[2]);
      renderDays(data[3]);
      const startTime = `${data[4][0]}:${data[4][1]}`
      const endTime = `${data[4][2]}:${data[4][3]}`
      document.getElementById("startTime").value = formatTime(startTime);
      document.getElementById("endTime").value = formatTime(endTime);      
      document.getElementById("activeEmp").innerText = data[5]+" sold"
    });
    const socket = io();

    // Listen for connection
    socket.on("connect", () => {
      console.log("Connected to server");
    });

    // Listen for custom server events
    socket.on("response", (data) => {
      const light = document.getElementById("machineLight");
      const text = document.getElementById("machineText");

      if (data.data == 1) {
        light.classList.remove("red");
        light.classList.add("green");
        text.innerText = "VM Online";
      } else if (data.data == 0 || data.data ==2) {
        light.classList.remove("green");
        light.classList.add("red");
        if(data.data==2){
          showAlert("Restart Machine for 5 mins!", "error");          
          text.innerText = "Restart Machine";
        } 
        else
          text.innerText = "VM Offline";   
          
      } else {
        document.getElementById("machineStatus").innerText =
          data.data == "on" ? "ON" : "OFF";
        document.getElementById("machineStatus").style.color =
          data.data == "on" ? "#4CAF50" : "#000000";
        document.getElementById("toggleSwitch").checked = data.data == "on"
          ? true
          : false;
      }
    });
    
    function showAlert(message, type) {
      const alertBox = document.getElementById("alertBox");

      alertBox.innerText = message;
      alertBox.className = `alert ${type}`;
      alertBox.style.display = "block";

      // Hide after 2 seconds
      setTimeout(() => {
        alertBox.style.display = "none";
      }, 2000);
    }
    const startTime = document.getElementById("startTime");
    const endTime = document.getElementById("endTime");

    async function validateTime() {

      if (startTime.value && endTime.value) {

        if (endTime.value <= startTime.value) {

          alert("End time must be later than start time");

          endTime.value = "";
        }
        else {
          // alert("Pick time Selected!");
          const res = await fetch("/updateschedule", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              startTime: startTime.value,
              endTime: endTime.value
            })
          });

          const data = await res.json();

          if(data.success){
              showAlert(data.message, "success");

          }else{
            showAlert(data.message, "error");
          }

        }

      }
    }

    startTime.addEventListener("change", validateTime);
    endTime.addEventListener("change", validateTime);

  </script>
</body>

</html>
