<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f6fa;
    }

    /* Header */
    .header {
        display: flex;
        justify-content: space-around;
        align-items: center;
        background: #1e293b;
        color: white;
        padding: 12px 0;
        position: sticky;
        top: 0;
    }

    .tab {
        cursor: pointer;
        padding: 10px 15px;
        border-radius: 6px;
        transition: 0.3s;
        font-size: 14px;
    }

    .tab:hover, .tab.active {
        background: #ffffff;
        color: black;
    }

    .container {
        padding: 20px;
    }

    /* Date picker */
    .date-picker {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 10px;
    }

    .date-picker input {
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    .date-picker button {
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        background: #2563eb;
        color: white;
        cursor: pointer;
    }

    /* selected chips */
    .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 20px;
    }

    .chip {
        background: #e2e8f0;
        padding: 6px 10px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
        user-select: none;
    }

    .chip:hover {
        background: #cbd5e1;
    }

    /* Cards */
    .cards {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        margin-bottom: 20px;
    }

    .card {
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card h3 {
        margin: 0;
        font-size: 14px;
        color: gray;
    }

    .card p {
        font-size: 20px;
        margin: 5px 0 0;
        font-weight: bold;
    }

    /* Table */
    .table-wrapper {
        overflow-x: auto;
        background: white;
        border-radius: 10px;
        padding: 10px 5px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        min-width: 700px;
    }

    th, td {
        text-align: left;
        white-space: nowrap;
        border: 1px solid #ddd;
        padding: 8px;
    }

    tr:nth-child(even){background-color: #f2f2f2;}

    tr:hover {background-color: #ddd;}

    th {
    padding-top: 12px;
    padding-bottom: 12px;
    text-align: left;
    background-color: #04AA6D;
    color: white;
    }

    .status {
        padding: 5px 10px;
        border-radius: 6px;
        font-size: 12px;
        display: inline-block;
    }

    .active { background: #dcfce7; color: #166534; }
    .pending { background: #fef9c3; color: #92400e; }
    .denied { background: #fee2e2; color: #991b1b; }

    button {
        padding: 5px 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-right: 5px;
        font-size: 12px;
    }

    .view { background: #3b82f6; color: white; }
    .edit { background: #e5e7eb; }

    select {
        padding: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 12px;
    }

    @media (max-width: 768px) {
        .cards {
            grid-template-columns: 1fr 1fr;
        }
    }

    @media (max-width: 500px) {
        .cards {
            grid-template-columns: 1fr;
        }
    }

</style>
</head>

<body>

<div class="header">
    <div class="tab active" id="dashboard" onclick="showTab('dashboard', this)">Dashboard</div>
    <div class="tab" id="employee" onclick="showTab('employee', this)">Employee</div>
    <div class="tab" id="history" onclick="showTab('history', this)">History</div>
</div>

<div class="container">

        <h3>Day-off Scheduling</h3>
    <div class="date-picker">
        <input type="date" id="dateInput" />
        <button onclick="addDate()">Add Date</button>
    </div>

    <div class="cards">
        <div class="card"><h3>Selected Dates</h3><p id="selectedDays">None</p></div>
        <div class="card"><h3>Total Employees</h3><p id="totalEmp"></p></div>
        <div class="card"><h3>Items Sold</h3><p id="activeEmp"></p></div>
        <div class="card"><h3>Machine Status</h3><p id="machineStatus" style="color: green;">ON</p></div>
    </div>

    <div class="table-wrapper">
        <h3>Today Usage | 2026-05-03</h3>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Card ID</th>
                    <th>Limit</th>
                    <th>Items</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="empTable"></tbody>
        </table>
    </div>

</div>

<script>
function showTab(tabId, element) {
    console.log('tabid', tabId)
    console.log('element', element)
    if(tabId=='employee')
        window.location.href='/employee'
    else if(tabId=='history')
        window.location.href='/history'
}
const employees = [
    { id: "E101", name: "John Doe", limit: 5, items: 1, status: "Active" },
    { id: "E102", name: "Jane Smith", limit: 5, items: 0, status: "Pending" },
    { id: "E103", name: "Michael Lee", limit: 5, items: 3, status: "Active" },
    { id: "E104", name: "Sarah Kim", limit: 5, items: 5, status: "Denied" }
];

const selectedDates = new Set();

function addDate() {
    const input = document.getElementById("dateInput");
    const val = input.value;
    if (!val) return;

    if (selectedDates.has(val)) {
        selectedDates.delete(val);
    } else {
        selectedDates.add(val);
    }

    renderDates();
    input.value = "";
}

function removeDate(date) {
    selectedDates.delete(date);
    renderDates();
}

function renderDates() {
    const list = Array.from(selectedDates).sort();

    document.getElementById("selectedDays").innerText = list.length ? list.join(", ") : "None";

    const chips = document.getElementById("chips");
    chips.innerHTML = "";

    list.forEach(d => {
        const el = document.createElement("div");
        el.className = "chip";
        el.innerText = d + " ✕";
        el.onclick = () => removeDate(d);
        chips.appendChild(el);
    });
}

function renderTable() {
    let html = "";

    employees.forEach(emp => {
        html += `
        <tr>
            <td>${emp.name}</td>
            <td>${emp.id}</td>
            <td> 5 </td>
            <td>${emp.items} left</td>
            <td>
                <span class="status ${emp.status.toLowerCase()}">${emp.status}</span>
            </td>
            <td>
                <button class="view">Edit</button>
            </td>
        </tr>
        `;
    });

    document.getElementById("empTable").innerHTML = html;
    document.getElementById("totalEmp").innerText = employees.length;
    document.getElementById("activeEmp").innerText = employees.filter(e=>e.status=="Active").length;
    // document.getElementById("machineStatus").innerText = employees.filter(e=>e.status=="machinestatus").length;
}

renderTable();

</script>

</body>
</html>
